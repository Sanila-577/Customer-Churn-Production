columns:
  critical_features:
  - TotalCharges
  drop_columns:
  - customerID
  feature_columns:
  - customerID
  - gender
  - Partner
  - Dependents
  - PhoneService
  - MultipleLines
  - InternetService
  - OnlineSecurity
  - OnlineBackup
  - DeviceProtection
  - TechSupport
  - StreamingTV
  - StreamingMovies
  - Contract
  - PaperlessBilling
  - PaymentMethod
  - TotalCharges
  - Churn
  - SeniorCitizen
  - tenure
  - MonthlyCharges
  nominal_columns:
  - Partner
  - gender
  - Dependents
  - PhoneService
  - MultipleLines
  - InternetService
  - OnlineSecurity
  - OnlineBackup
  - DeviceProtection
  - TechSupport
  - StreamingTV
  - StreamingMovies
  - Contract
  - PaperlessBilling
  - PaymentMethod
  - Churn
  - TotalCharges
  - SeniorCitizen
  numeric_columns:
  - tenure
  - MonthlyCharges
  - TotalCharges
  outlier_columns:
  - tenure
  - MonthlyCharges
  - TotalCharges
  target: Churn
data_paths:
  X_test: artifacts/data/X_test.csv
  X_train: artifacts/data/X_train.csv
  Y_test: artifacts/data/Y_test.csv
  Y_train: artifacts/data/Y_train.csv
  artifacts_dir: artifacts
  data_artifacts_dir: artifacts/data
  model_artifacts_dir: artifacts/models
  processed_data: data/processed/TelcoCustomerChurn_Missing_Values_Handled.csv
  processed_dir: data/processed
  raw_data: data/raw/TelcoCustomerChurn.csv
data_splitting:
  n_splits: 5
  random_state: 42
  split_type: simple
  test_size: 0.2
deployment:
  api_endpoint: /predict
  batch_size: 1000
  model_name: churn_analysis_model
  model_version: 1.0.0
environment:
  experiment_name: churn_analysis
evaluation:
  cv_folds: 5
  metrics:
  - accuracy
  - precision
  - recall
  - f1-score
  random_state: 42
feature_binning:
  bundle_columns:
  - InternetService
  - PhoneService
  charge_bins:
    High:
    - 0
    - 1
    Low:
    - 0
    - 1
    Medium:
    - 0
    - 1
  service_columns:
  - PhoneService
  - MultipleLines
  - InternetService
  - OnlineSecurity
  - OnlineBackup
  - DeviceProtection
  - TechSupport
  - StreamingTV
  - StreamingMovies
  tenure_bins:
    Established:
    - 13
    - 48
    Loyal:
    - 49
    - 72
    New:
    - 0
    - 12
feature_encoding:
  nominal_columns:
  - Partner
  - gender
  - Dependents
  - PhoneService
  - MultipleLines
  - InternetService
  - OnlineSecurity
  - OnlineBackup
  - DeviceProtection
  - TechSupport
  - StreamingTV
  - StreamingMovies
  - Contract
  - PaperlessBilling
  - PaymentMethod
  - TotalCharges
  - SeniorCitizen
  - Charge_category
  - Tenture_category
  - Service_count
  - Bundle_user
  ordinal_mappings:
    Churn:
      false: 0
      true: 1
feature_scaling:
  columns_to_scale:
  - tenure
  - MonthlyCharges
  - TotalCharges
  columns_to_transform:
  - tenure
  scaling_type: standard
inference:
  batch_size: 1000
  data_path: artifacts/data/X_test.csv
  model_name: logistic_regression_cv_model
  return_proba: true
  sample_size: 100
  save_path: artifacts/predictions/predictions.csv
logging:
  file: pipeline.log
  format: '%(asctime)s - %(levelname)s - %(message)s'
  level: INFO
missing_values:
  strategy: fill
mlflow:
  artifact_path: model
  autolog: true
  experiment_name: Churn Analysis
  model_registry_name: churn_prediction
  run_name_prefix: churn_run
  tags:
    environment: development
    project: customer_churn_prediction
    team: ml_engineering
  tracking_uri: file:./mlruns
model:
  data_path: data/raw/TelcoCustomerChurn.csv
  evaluation_path: artifacts/evaluation/logistic_regression_cv_evaluation_report.txt
  model_params:
    class_weight: balanced
    max_iter: 100
  model_path: artifacts/models/logistic_regression_cv_model.pkl
  model_type: logistic_regression
  model_types:
    gradient_boosting:
      max_depth: 5
      n_estimators: 100
      random_state: 42
    logistic_regression:
      class_weight: balanced
      max_iter: 100
    random_forest:
      max_depth: 10
      n_estimators: 100
      random_state: 42
    svm:
      probability: true
      random_state: 42
  training_strategy: cv
outlier_detection:
  detection_method: iqr
  handling_method: remove
  z_score_threshold: 3.0
pipeline:
  data_pipeline_name: data_processing_pipeline
  deployment_pipeline_name: model_deployment_pipeline
  enable_cache: false
  inference_pipeline_name: inference_pipeline
  training_pipeline_name: model_training_pipeline
training:
  cv_folds: 5
  default_model_type: logistic_regression
  default_training_strategy: cv
  early_stopping_patience: 10
  hyperparameter_tuning:
    cv_folds: 5
    enabled: false
    n_iter: 20
    search_method: grid
  max_iterations: 1000
  random_state: 42
  test_size: 0.2
  validation_split: 0.2
